<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>애니메이션</title>
<style>
    @keyframes textAnimation {
        0% {font-size: 100;}
        100% {font-size: 0;}

    }
    span{
        animation-name: textAnimation;
        animation-duration: 1s;
        animation-iteration-count: infinite;
    }
</style>


</head>

<body>

<h3><span>꽝!</span></h3>

<hr>

<p>글자가 3초동안 500%에서

시작하여 100%로 바뀌는

애니메이션입니다. 무한 반복합니다.</p>

</body>

</html>
