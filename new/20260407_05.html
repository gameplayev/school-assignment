<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #rd{
        position: absolute;
        width: 5em;
        height: 5em;
        background-color: red;
        z-index: 0;

    }
    #yel{
        position: absolute;
        width: 20em;
        height: 20em;
        background-color: yellow;
        left: 5em;
        top: 10em;
        z-index: 0;

    }
    #gr{
        position: absolute;
        z-index: 1;
        width: 5em;
        height: 5em;
        background-color: green;
        left: 10em;
        top: 10em;
    }
    #bl{
        left: 10em;
        top: 20em;
        position: absolute;
        width: 5em;
        height: 5em;
        background-color: blue;
    }
</style>
<body>
    <div id="rd"> </div>
    <div id = "yel"></div>
    <div id ="gr"></div>
    <div id="bl"></div>
</body>
</html>
