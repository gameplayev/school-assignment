<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function printStar(value){
            for(let i = 1;i<=value;i++){
                for(let j = 0;j<i;j++){
                    document.write("*")
                }
                document.write("<br>")
            }

        
        }
    </script>
</head>
<body>
    <script>
        document.write("<h1> 별 문자 출력하기")
        let val = prompt("정수를 입력하세요");
        document.write("<hr>")
        if(val > 0){
            printStar(val);
        }
        else{
            document.write("올바르지 않는 입력값")
        }
    </script>
</body>
</html>
